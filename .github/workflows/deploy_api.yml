name: Deploy API to Hugging Face Spaces

on:
  push:
    branches: [ "main" ]
    paths:
      - '5-Deploiement/getaround_project/api/**'
      - '.github/workflows/deploy_api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "204518881+AichaFa@users.noreply.github.com"
          git config --global user.name "AichaFa"
          
          # 1. Clonage du Space dans un dossier temporaire
          git clone https://AichaFa:$HF_TOKEN@huggingface.co/spaces/AichaFaHugFace/getaround-api hf_space
          
          # 2. Nettoyage et copie propre du nouveau contenu de l'API
          find hf_space -maxdepth 1 -not -name 'hf_space' -not -name '.git' -exec rm -rf {} \;
          cp -r 5-Deploiement/getaround_project/api/* hf_space/
          
          cd hf_space
          
          # 3. INITIALISATION ET CONFIGURATION DE GIT LFS POUR LES FICHIERS JOBLIB
          git lfs install
          git lfs track "*.joblib"
          git add .gitattributes
          
          # 4. Commit et Push linéaire
          git add .
          git diff-index --quiet HEAD || git commit -m "Deploy: Synchronisation avec support Git LFS pour .joblib"
          git push origin main
